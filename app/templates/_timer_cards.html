<div class="card">
  <label>
    Start Time Event
    <select id="start-event-select" data-start-events-endpoint="{{ start_events_endpoint }}">
      <option value="latest" {% if selected_start_event_choice == "latest" %}selected{% endif %}>Last Submitted</option>
      {% for event in start_events %}
        <option value="{{ event.id }}" {% if selected_start_event_choice == (event.id | string) %}selected{% endif %}>{{ event.option_label }}</option>
      {% endfor %}
    </select>
  </label>
  <div id="timer-meta-list" class="timer-meta-list"></div>
  <p
    id="timer-no-start-events"
    class="small"
    {% if start_events %}hidden{% endif %}
  >
    No start time events submitted yet for this race part.
  </p>
</div>
<div id="timer-card" class="card timer-card">
  <div id="timer-panel" class="timer-live-row">
    <div id="timer-display" class="digital-timer">00:00:00.0</div>
    <button
      id="fullscreen-toggle"
      class="timer-fullscreen-toggle"
      type="button"
      title="Full screen"
      aria-label="Enter full screen"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3.5 3.5H9M15 3.5H20.5M20.5 3.5V9M20.5 15V20.5M3.5 20.5H9M15 20.5H20.5M3.5 3.5V9M3.5 15V20.5" />
      </svg>
    </button>
  </div>
</div>
