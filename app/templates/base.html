<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else "GLH Timer" }}</title>
  <meta name="application-name" content="GLH Timer" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GLH Timer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f26b3a" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/img/GLHTimer_192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/static/img/GLHTimer_512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/GLHTimer_180.png" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <a href="https://bertels.ai" target="_blank" rel="noopener noreferrer">bertels.ai</a>
      <span class="divider">•</span>
      <a href="/">GLH Timer</a>
    </div>
    <div class="auth">
      {% if user %}
        <span class="small">logged in as {{ user.role }}</span>
        <form method="post" action="/logout">
          <button class="button ghost" type="submit">Logout</button>
        </form>
      {% else %}
        <a class="button ghost" href="/login">Log in</a>
      {% endif %}
    </div>
  </header>

  {% if back_url %}
  <div class="toolbar">
    <a class="button ghost" href="{{ back_url }}">{{ back_label }}</a>
  </div>
  {% endif %}

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <div id="flash" class="flash" aria-live="polite"></div>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
